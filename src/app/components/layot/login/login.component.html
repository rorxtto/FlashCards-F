<div class="container-login">
  
    <article class="formLogin">
      <header>
          <h1 class="title">Bem vindo ao <span class="highlight">Flashcards</span></h1>
      </header>
  
      <aside>
  
          <form class="form"> 
              <div class="mb-3">
                  <label style="font-family: 'Poppins'; font-style: normal; font-weight: 400; font-size: 16px; line-height: 24px; color: #000000;" class="form-label"> Email </label>
                  <input type="email"placeholder="Insira seu e-mail"class="form-control" [(ngModel)]="usuario" name="usuario" />
              </div>
  
              <div class="mb-3">
                  <label style="font-family: 'Poppins'; font-style: normal; font-weight: 400; font-size: 16px; line-height: 24px; color: #000000;" class="form-label" >Senha </label>
                  <input placeholder="Insira sua senha" type="password" class="form-control" [(ngModel)]="senha" name="senha"/>
              </div>
  
              <div  class="mb-3 form-check">
                  <p class="question"> Esqueceu sua senha? <a href="https://hotmart.com/pt-br" class="link" href="https://hotmart.com/pt-br">Clique aqui</a> </p>
              </div>
  
              <button class="btn-aceesar" (click)="logar()">Acessar</button>
  
          </form>
      </aside>
  </article>

  <div class="fundo">
      <div class="principal">
        <h1 class="titulo">NOME FLASH CARDS</h1>
        <p class="texto"> Desbloqueie o conhecimento com nossos flash cards inteligentes.</p>
        <a href="/landingpage" class="button-assin">Assine Já</a>
      </div>
    </div>

</div>
